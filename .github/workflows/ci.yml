name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENVIRONMENT: test
      JWT_SECRET: ci_test_jwt_secret
      AI_SERVICE_API_KEY: ci_test_ai_key
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db
      DB_SSLMODE: disable
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: postgres
      TEST_DB_NAME: test_db
      TEST_DB_SSLMODE: disable
      FRONTEND_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://127.0.0.1:9999
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_KEY: ci_placeholder_supabase_key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend — install and pytest
        working-directory: backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

      - name: AI Service — install and pytest
        working-directory: aiService
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

  frontend-unit-tests:
    name: frontend-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Vitest
        working-directory: frontend
        run: npm run test:run

  e2e-tests:
    name: e2e-tests
    needs: [backend-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    env:
      CI: true
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://localhost:8000
      NEXTAUTH_SECRET: ci_nextauth_secret_must_be_at_least_32_chars_long
      GOOGLE_CLIENT_ID: ci-dummy-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright (Chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        working-directory: frontend
        run: npm run build

      - name: Playwright E2E (Chromium)
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
