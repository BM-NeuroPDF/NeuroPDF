name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  env-example-sync:
    name: env-example-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Env keys vs .env.example
        run: python scripts/check_env_example_sync.py

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENVIRONMENT: test
      JWT_SECRET: ci_test_jwt_secret
      AI_SERVICE_API_KEY: ci_test_ai_key
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db
      DB_SSLMODE: disable
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: postgres
      TEST_DB_NAME: test_db
      TEST_DB_SSLMODE: disable
      FRONTEND_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://127.0.0.1:9999
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_KEY: ci_placeholder_supabase_key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend — install and pytest
        working-directory: backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

      - name: AI Service — install and pytest
        working-directory: aiService
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

  frontend-unit-tests:
    name: frontend-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: ESLint
        working-directory: frontend
        run: npx eslint .

      - name: Vitest
        working-directory: frontend
        run: npm run test:run

  e2e-tests:
    name: e2e-tests
    needs: [env-example-sync, backend-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      BACKEND_API_URL: http://127.0.0.1:8000
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci_nextauth_secret_must_be_at_least_32_chars_long
      GOOGLE_CLIENT_ID: ci-dummy-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
      E2E_OTP_CODE: "123456"
      USE_SUPABASE: "false"
      LOCAL_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/test_db?sslmode=disable
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci_test_jwt_secret
      ENVIRONMENT: test
      FRONTEND_ORIGIN: http://127.0.0.1:3000
      AI_SERVICE_URL: http://127.0.0.1:9999
      AI_SERVICE_API_KEY: ci_test_ai_key
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_KEY: ci_placeholder_supabase_key
      E2E_MAGIC_OTP_ENABLED: "true"
      E2E_MAGIC_OTP_ALL_USERS: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend — install, migrate, and start API
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt
          alembic upgrade head
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become ready"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright (Chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        working-directory: frontend
        run: npm run build

      - name: Playwright E2E (Chromium)
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
