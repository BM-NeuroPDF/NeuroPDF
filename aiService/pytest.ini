[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --cov=app --cov-config=.coveragerc --cov-report=term

# Markers: ChromaDB/RAG, LLM mocking, format validation, async API
markers =
    chromadb: ChromaDB/RAG tests (requires chromadb; skip on Python 3.14)
    llm_mock: LLM mocking and prompt injection safety tests
    format: AI response format validation (JSON/Markdown)
    async_ai: Async AI endpoint tests (pytest-asyncio)