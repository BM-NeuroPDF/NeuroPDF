[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage: tek kaynak backend/.coveragerc (fail_under, omit, exclude_lines)
# Çalıştırma: pytest --cov=app --cov-config=.coveragerc

# Markers for test categorization
markers =
    unit: Unit tests (no database, mocked dependencies)
    integration: Integration tests (real database)
    api: API endpoint tests (FastAPI TestClient)
    slow: Slow running tests
