services:
  db:
    image: postgres:15-alpine
    container_name: neuropdf_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: neuropdf_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # 1. Redis
  redis_cache:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    container_name: backend
    build:
      context: ./backend
    # Apply Alembic migrations to the compose Postgres service, then start API.
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    volumes:
      - ./backend:/app
      - shared_uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_URL: "http://aiservice:8001"
      REDIS_URL: "redis://redis_cache:6379"
      # Override host-only .env so the container always targets the db service.
      USE_SUPABASE: "false"
      LOCAL_DATABASE_URL: postgresql+psycopg2://myuser:mypassword@db:5432/neuropdf_local?sslmode=disable
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app_network

  aiservice:
    container_name: aiService
    build:
      context: ./aiService
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./aiService:/app
      - shared_uploads:/app/uploads
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: "redis://redis_cache:6379"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "gemma2:9b"
    env_file:
      - ./aiService/.env
    depends_on:
      redis_cache:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - app_network

  aiceleryworker:
    container_name: aiCeleryWorker
    build:
      context: ./aiService
    command: celery -A app.tasks.celery_worker:celery_app worker --loglevel=info
    volumes:
      - ./aiService:/app
      - shared_uploads:/app/uploads
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis_cache:6379
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "gemma2:9b"
    env_file:
      - ./aiService/.env
    depends_on:
      redis_cache:
        condition: service_healthy
      aiservice:
        condition: service_started
      backend:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    # Bind mount + named node_modules volume can leave packages missing after
    # lockfile changes; sync before dev so new deps (e.g. input-otp) resolve.
    command: sh -c "npm install --no-fund --no-audit && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      BACKEND_API_URL: "http://backend:8000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - app_network

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_designer_llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - app_network
    restart: always

# --- VOLUMES ---
volumes:
  postgres_data:
  shared_uploads:
  ollama_storage:        # UNCOMMENTED THIS
  frontend_node_modules: # Matches the name in frontend service

# --- NETWORKS ---
networks:
  app_network:
    driver: bridge